  #version-tag { position:fixed; bottom:6px; left:10px; color:#2a2a3a;

  #map-label { position:fixed; top:50px; left:50%; transform:translateX(-50%);

const canvas=document.getElementById('game-canvas');
const ctx=canvas.getContext('2d');
let W=0,H=0;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;layoutNodes();updateCredBtnPos();}
window.addEventListener('resize',resize);
let nodes=[],activeEdges=[],currentMap=0;
function nodeRadius(n){return 18+(n.cap/30)*16;}
function initNodes(mi){
  const map=MAPS[mi];activeEdges=map.edges;
  nodes=map.nodes.map(d=>({...d,x:0,y:0,spring:{scale:1,vel:0,target:1},wash:{alpha:0,rgb:'255,255,255'}}));
  document.getElementById('map-label').textContent=map.name;
}
function layoutNodes(){
  const tp=48,bp=24,uh=H-tp-bp;
  nodes.forEach(n=>{const d=MAPS[currentMap].nodes[n.id];n.x=d.fx*W;n.y=tp+d.fy*uh;});
}
function nodeAt(px,py){
  let best=null,bd=Infinity;
  nodes.forEach(n=>{const d=Math.hypot(n.x-px,n.y-py);if(d<bd){bd=d;best=n;}});
  return(best&&bd<nodeRadius(best)*CFG.HIT_MUL)?best:null;
}
function bezierPt(sx,sy,cpx,cpy,ex,ey,t){const m=1-t;return{x:m*m*sx+2*m*t*cpx+t*t*ex,y:m*m*sy+2*m*t*cpy+t*t*ey};}
function makeCP(sx,sy,ex,ey,seed){
  const mx=(sx+ex)/2,my=(sy+ey)/2,dx=ex-sx,dy=ey-sy,dist=Math.hypot(dx,dy)||1;
  const nx=-dy/dist,ny=dx/dist,dir=(seed%2===0)?1:-1,bend=dist*CFG.CURVE_BEND*dir;
  return{cpx:mx+nx*bend,cpy:my+ny*bend};
}
function easedT(r){
  const ei=CFG.EASE_IN_DIST,eo=CFG.EASE_OUT_DIST,ep=CFG.EASE_POWER;
  if(r<ei)return Math.pow(r/ei,ep)*ei;
  if(r>1-eo){const u=(r-(1-eo))/eo;return(1-eo)+(1-Math.pow(1-u,ep))*eo;}
  return r;
}
let waves=[],waveSeq=0;
function launchWave(src,dst,owner){
  if(src.id===dst.id||src.owner!==owner)return;
  const sent=Math.floor(src.troops*CFG.SEND_FRAC);if(sent<1)return;
  src.troops-=sent;
  const dist=Math.hypot(dst.x-src.x,dst.y-src.y)||1,duration=dist/CFG.WAVE_SPEED;
  const{cpx,cpy}=makeCP(src.x,src.y,dst.x,dst.y,waveSeq);
  const totalDots=Math.min(sent,CFG.MAX_DOTS);
  const jitterSeeds=Array.from({length:totalDots},()=>(Math.random()-.5)*2);
  waves.push({id:waveSeq++,owner,srcId:src.id,dstId:dst.id,sent,t:0,duration,
    sx:src.x,sy:src.y,ex:dst.x,ey:dst.y,cpx,cpy,totalDots,jitterSeeds});
  nodePulse(src,CFG.PULSE_SEND);
}
function updateWaves(dt){
  const done=[];
  waves.forEach(w=>{w.t+=dt/w.duration;if(w.t>=1)done.push(w);});
  done.forEach(w=>{waves=waves.filter(x=>x!==w);resolveArrival(w);});
}
function resolveArrival(w){
  const dst=nodes[w.dstId];
  if(dst.owner===w.owner){
    dst.troops=Math.min(dst.cap,dst.troops+w.sent);nodePulse(dst,CFG.PULSE_RECV);
  }else if(w.sent>dst.troops){
    dst.owner=w.owner;dst.troops=w.sent-dst.troops;
    dst.wash.alpha=0.70;dst.wash.rgb=ownerRgb(w.owner);
    nodePulse(dst,CFG.PULSE_RECV);spawnImpact(dst.x,dst.y,w.owner,CFG.IMPACT_COUNT*1.5);checkWin();
  }else{
    dst.troops-=w.sent;
    if(dst.troops<=0&&dst.owner!==OWNER.NONE){dst.owner=OWNER.NONE;dst.troops=0;}
    spawnImpact(dst.x,dst.y,w.owner,CFG.IMPACT_COUNT);nodePulse(dst,CFG.PULSE_HIT);
  }
}
let impacts=[];
function spawnImpact(x,y,owner,count){
  if(CFG.REDUCED_MOTION)return;
  const n=Math.ceil(count);
  for(let i=0;i<n;i++){
    const ang=(Math.PI*2*i/n)+(Math.random()-.5)*.8,spd=CFG.IMPACT_SPEED*(.7+Math.random()*.6);
    impacts.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:CFG.IMPACT_LIFE,maxLife:CFG.IMPACT_LIFE,rgb:ownerRgb(owner)});
  }
}
function updateImpacts(dt){
  impacts=impacts.filter(p=>{p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.88;p.vy*=.88;return p.life>0;});
}
function nodePulse(n,target){n.spring.target=target;}
function updateNodeAnims(dt){
  nodes.forEach(n=>{
    const sp=n.spring;
    sp.vel+=(sp.target-sp.scale)*CFG.SPRING_K-sp.vel*CFG.SPRING_DAMP;sp.scale+=sp.vel;
    if(Math.abs(sp.scale-1)<.002&&Math.abs(sp.vel)<.002){sp.scale=1;sp.vel=0;sp.target=1;}
    if(n.wash.alpha>0)n.wash.alpha=Math.max(0,n.wash.alpha-CFG.WASH_DECAY*dt);
  });
}
function tickProd(dt){
  nodes.forEach(n=>{if(n.owner===OWNER.NONE)return;n.troops=Math.min(n.cap,n.troops+n.prod*dt);});
}
let aiTimer=0;
function tickAI(dt){
  aiTimer+=dt;if(aiTimer<CFG.AI_INTERVAL)return;aiTimer=0;
  const aiN=nodes.filter(n=>n.owner===OWNER.AI&&n.troops>=CFG.AI_MIN_TROOPS);
  if(!aiN.length)return;
  const atk=aiN.reduce((a,b)=>a.troops>b.troops?a:b);
  const tgts=nodes.filter(n=>n.owner!==OWNER.AI);if(!tgts.length)return;
  const tgt=tgts.reduce((best,t)=>{
    const sb=best.troops+Math.hypot(atk.x-best.x,atk.y-best.y)*.07;
    const st=t.troops+Math.hypot(atk.x-t.x,atk.y-t.y)*.07;
    return st<sb?t:best;
  });
  launchWave(atk,tgt,OWNER.AI);
}
let gameState='playing',endResult=null,gameTime=CFG.GAME_DURATION;
function tickTimer(dt){if(gameState!=='playing')return;gameTime-=dt;if(gameTime<=0){gameTime=0;endGame();}}
function checkWin(){
  if(gameState!=='playing')return;
  const p=nodes.filter(n=>n.owner===OWNER.PLAYER).length;
  const a=nodes.filter(n=>n.owner===OWNER.AI).length;
  if(a===0||p===0)endGame();
}
function endGame(){
  if(gameState==='ended')return;gameState='ended';
  const p=nodes.filter(n=>n.owner===OWNER.PLAYER).length;
  const a=nodes.filter(n=>n.owner===OWNER.AI).length;
  let pt=0,at=0;
  nodes.forEach(n=>{if(n.owner===OWNER.PLAYER)pt+=n.troops;if(n.owner===OWNER.AI)at+=n.troops;});
  if(p>a)endResult='player';else if(a>p)endResult='ai';
  else if(pt>at)endResult='player';else if(at>pt)endResult='ai';else endResult='draw';
}
function startGame(advanceMap){
  if(advanceMap)currentMap=(currentMap+1)%MAPS.length;
  gameState='playing';endResult=null;gameTime=CFG.GAME_DURATION;
  waves=[];impacts=[];aiTimer=0;overlayBtns=[];
  initNodes(currentMap);layoutNodes();
}
let drag=null,overlayBtns=[],showCredits=false;
function inputDown(px,py){
  // Credits button (always tappable except mid-drag)
  if(Math.hypot(px-credBtn.x,py-credBtn.y)<credBtn.r+10){showCredits=!showCredits;return;}
  if(showCredits){showCredits=false;return;}
  if(gameState==='ended'){
    for(const b of overlayBtns)if(px>=b.x&&px<=b.x+b.w&&py>=b.y&&py<=b.y+b.h){b.action();return;}
    return;
  }
  const hit=nodeAt(px,py);
  if(hit){nodePulse(hit,1.10);if(hit.owner===OWNER.PLAYER&&hit.troops>=2)drag={srcNode:hit,curX:px,curY:py};}
}
function inputMove(px,py){if(drag){drag.curX=px;drag.curY=py;}}
function inputUp(px,py){
  if(!drag)return;
  const dst=nodeAt(px,py);
  if(dst&&dst!==drag.srcNode){launchWave(drag.srcNode,dst,OWNER.PLAYER);nodePulse(dst,1.08);}
  drag=null;
}
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];inputDown(t.clientX,t.clientY);},{passive:false});
canvas.addEventListener('touchmove', e=>{e.preventDefault();const t=e.changedTouches[0];inputMove(t.clientX,t.clientY);},{passive:false});
canvas.addEventListener('touchend',  e=>{e.preventDefault();const t=e.changedTouches[0];inputUp(t.clientX,t.clientY);},{passive:false});
canvas.addEventListener('touchcancel',()=>{drag=null;});
canvas.addEventListener('mousedown',e=>inputDown(e.clientX,e.clientY));
canvas.addEventListener('mousemove',e=>inputMove(e.clientX,e.clientY));
canvas.addEventListener('mouseup',  e=>inputUp(e.clientX,e.clientY));
function drawEdges(){
  ctx.save();
  activeEdges.forEach(([a,b])=>{
    const na=nodes[a],nb=nodes[b],hi=drag&&(drag.srcNode.id===a||drag.srcNode.id===b);
    ctx.strokeStyle=hi?PAL.edgeDrag:PAL.edge;ctx.lineWidth=hi?1.8:1.0;
    ctx.globalAlpha=hi?.70:.38;ctx.setLineDash(hi?[]:[3,7]);
    ctx.beginPath();ctx.moveTo(na.x,na.y);ctx.lineTo(nb.x,nb.y);ctx.stroke();
  });
  ctx.setLineDash([]);ctx.globalAlpha=1;ctx.restore();
}
function diamond(x,y,s){
  ctx.beginPath();ctx.moveTo(x,y-s);ctx.lineTo(x+s,y);ctx.lineTo(x,y+s);ctx.lineTo(x-s,y);ctx.closePath();ctx.fill();
}
function drawWaves(){
  waves.forEach(w=>{
    const rgb=ownerRgb(w.owner);
    for(let i=0;i<w.totalDots;i++){
      const clOff=Math.floor(i/CFG.WAVE_CLUSTER_SIZE)*CFG.WAVE_CLUSTER_GAP;
      const dotT=w.t-i*CFG.PARTICLE_GAP-clOff;
      if(dotT<=0)break;if(dotT>=1)continue;
      const et=easedT(Math.min(1,Math.max(0,dotT)));
      const bp=bezierPt(w.sx,w.sy,w.cpx,w.cpy,w.ex,w.ey,et);
      const et2=easedT(Math.min(1,Math.max(0,dotT+.01)));
      const bp2=bezierPt(w.sx,w.sy,w.cpx,w.cpy,w.ex,w.ey,et2);
      const tdx=bp2.x-bp.x,tdy=bp2.y-bp.y,tlen=Math.hypot(tdx,tdy)||1;
      const jit=w.jitterSeeds[i]*CFG.LATERAL_JITTER*Math.sin(dotT*CFG.JITTER_FREQ*Math.PI);
      const px=bp.x+(-tdy/tlen)*jit,py=bp.y+(tdx/tlen)*jit;
      if(!CFG.REDUCED_MOTION&&i===0){
        for(let tr=1;tr<=CFG.TRAIL_LEN;tr++){
          const tbp=bezierPt(w.sx,w.sy,w.cpx,w.cpy,w.ex,w.ey,easedT(Math.max(0,dotT-tr*.018)));
          ctx.globalAlpha=CFG.TRAIL_ALPHA_MAX*Math.pow(CFG.TRAIL_FADE,tr);
          ctx.fillStyle='rgb('+rgb+')';diamond(tbp.x,tbp.y,CFG.PARTICLE_SIZE*(1-tr*.14));
        }
        ctx.globalAlpha=1;
      }
      ctx.globalAlpha=.85+.15*(1-dotT);ctx.fillStyle='rgb('+rgb+')';diamond(px,py,CFG.PARTICLE_SIZE);
    }
    ctx.globalAlpha=1;
  });
}
function drawImpacts(){
  if(CFG.REDUCED_MOTION)return;
  impacts.forEach(p=>{
    const f=p.life/p.maxLife;ctx.globalAlpha=f*.85;ctx.fillStyle='rgb('+p.rgb+')';
    diamond(p.x,p.y,CFG.IMPACT_SIZE*(.5+f*.5));
  });
  ctx.globalAlpha=1;
}
function drawNode(n){
  const r=nodeRadius(n),cx=n.x,cy=n.y,isPow=n.type==='power',isSel=drag&&drag.srcNode===n,sc=n.spring.scale;
  ctx.save();ctx.translate(cx,cy);ctx.scale(sc,sc);ctx.translate(-cx,-cy);
  const ha=isSel?.32:isPow?.20:.11,hr=r*(isPow?2.2:1.7);
  const hrgb=n.owner===OWNER.PLAYER?PAL.playerRgb:n.owner===OWNER.AI?PAL.aiRgb:isPow?'200,68,255':'80,80,120';
  const hg=ctx.createRadialGradient(cx,cy,r*.3,cx,cy,hr);
  hg.addColorStop(0,'rgba('+hrgb+','+ha+')');hg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(cx,cy,hr,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();
  const fg=ctx.createRadialGradient(cx-r*.3,cy-r*.3,0,cx,cy,r);
  fg.addColorStop(0,ownerColor(n.owner,false));fg.addColorStop(1,ownerColor(n.owner,true));
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=fg;ctx.fill();
  if(n.wash.alpha>0){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle='rgba('+n.wash.rgb+','+n.wash.alpha*.55+')';ctx.fill();}
  ctx.lineWidth=isPow?2.8:isSel?2.8:1.8;
  ctx.strokeStyle=isPow?PAL.power:isSel?(n.owner===OWNER.PLAYER?'#66ccff':'#ff8855'):ownerColor(n.owner,false);
  ctx.stroke();
  if(isSel){ctx.lineWidth=1.5;ctx.strokeStyle='rgba('+PAL.playerRgb+',.38)';ctx.beginPath();ctx.arc(cx,cy,r*1.35,0,Math.PI*2);ctx.stroke();}
  if(isPow){ctx.save();ctx.globalAlpha=.55;ctx.font=Math.round(r*.70)+'px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=PAL.power;ctx.fillText('⬡',cx,cy-r*.05);ctx.restore();}
  const lbl=Math.floor(n.troops).toString(),fs=Math.round(r*.68);
  ctx.font='bold '+fs+'px Courier New,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillText(lbl,cx+1,cy+1.5);
  ctx.fillStyle=PAL.text;ctx.fillText(lbl,cx,cy);
  ctx.restore();
}
function drawDragLine(){
  if(!drag)return;
  const{srcNode:s,curX,curY}=drag;
  ctx.save();
  ctx.strokeStyle='rgba('+PAL.playerRgb+',.60)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(curX,curY);ctx.stroke();
  const sent=Math.floor(s.troops*CFG.SEND_FRAC),mx=(s.x+curX)/2,my=(s.y+curY)/2-12;
  ctx.font='bold 12px Courier New';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillText('⟶'+sent,mx+1,my+1);
  ctx.fillStyle='rgba('+PAL.playerRgb+',1)';ctx.fillText('⟶'+sent,mx,my);
  const ang=Math.atan2(curY-s.y,curX-s.x);
  ctx.beginPath();ctx.moveTo(curX,curY);
  ctx.lineTo(curX-Math.cos(ang-.4)*14,curY-Math.sin(ang-.4)*14);
  ctx.lineTo(curX-Math.cos(ang+.4)*14,curY-Math.sin(ang+.4)*14);
  ctx.closePath();ctx.fillStyle='rgba('+PAL.playerRgb+',.75)';ctx.fill();
  ctx.restore();
}

// Credits button (drawn bottom-left)
const credBtn={x:28,y:0,r:14}; // y set in resize
function updateCredBtnPos(){credBtn.y=H-22;}

function drawCredBtn(){
  const cb=credBtn;
  ctx.save();
  ctx.beginPath();ctx.arc(cb.x,cb.y,cb.r,0,Math.PI*2);
  ctx.fillStyle='rgba(20,20,40,0.80)';ctx.fill();
  ctx.strokeStyle='rgba(100,100,160,0.60)';ctx.lineWidth=1.2;ctx.stroke();
  ctx.font='bold 13px Courier New,monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(160,160,220,0.80)';ctx.fillText('i',cb.x,cb.y+1);
  ctx.restore();
}

function drawCreditsScreen(){
  const cx=W/2,cy=H/2;
  // backdrop
  ctx.save();
  ctx.fillStyle='rgba(4,4,14,0.94)';ctx.fillRect(0,0,W,H);
  // panel
  const pw=Math.min(340,W-40),ph=260,px2=cx-pw/2,py2=cy-ph/2;
  ctx.beginPath();roundRect(ctx,px2,py2,pw,ph,14);
  ctx.fillStyle='rgba(14,14,28,0.97)';ctx.fill();
  ctx.strokeStyle='rgba(80,80,140,0.70)';ctx.lineWidth=1.5;ctx.stroke();
  // title
  ctx.font='bold 22px Courier New,monospace';ctx.textAlign='center';ctx.textBaseline='top';

  ctx.fillText('NEURON WARS',cx,py2+18);ctx.shadowBlur=0;
  // subtitle
  ctx.font='10px Courier New,monospace';ctx.fillStyle='rgba(160,160,200,.55)';

  // divider
  ctx.strokeStyle='rgba(80,80,140,0.40)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(px2+20,py2+64);ctx.lineTo(px2+pw-20,py2+64);ctx.stroke();
  // credits heading
  ctx.font='bold 11px Courier New,monospace';ctx.fillStyle='rgba(200,200,220,.70)';
  ctx.fillText('CREDITS',cx,py2+76);
  // contributor
  ctx.shadowBlur=0;
  ctx.font='bold 15px Courier New,monospace';ctx.fillStyle='#2299ff';
  ctx.fillText('Pankaj',cx,py2+100);
  ctx.font='10px Courier New,monospace';ctx.fillStyle='rgba(150,180,255,.65)';
  ctx.fillText('linkedin.com/in/genai-guru-pankaj',cx,py2+122);
  ctx.fillText('x.com/pankajtiw',cx,py2+138);
  // built with
  ctx.strokeStyle='rgba(80,80,140,0.40)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(px2+20,py2+158);ctx.lineTo(px2+pw-20,py2+158);ctx.stroke();
  ctx.font='10px Courier New,monospace';ctx.fillStyle='rgba(130,130,170,.55)';
  ctx.fillText('Built with Claude · Vanilla JS · Zero dependencies',cx,py2+172);
  ctx.fillText('Single index.html · YouTube Playables spec',cx,py2+188);

  const pulse=.5+.5*Math.sin(Date.now()/550);

function roundRect(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);
  c.arcTo(x+w,y,x+w,y+h,r);c.lineTo(x+w,y+h-r);
  c.arcTo(x+w,y+h,x,y+h,r);c.lineTo(x+r,y+h);
  c.arcTo(x,y+h,x,y,r);c.lineTo(x,y+r);
  c.arcTo(x,y,x+w,y,r);c.closePath();
}

function pillBtn(x,y,w,h,label,col,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  const r=h/2;
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y,r);ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
  ctx.fillStyle='rgba(8,8,20,.88)';ctx.fill();
  ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke();
  ctx.font='bold 14px Courier New,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor=col;ctx.shadowBlur=10;ctx.fillStyle=col;ctx.fillText(label,x+w/2,y+h/2);
  ctx.restore();
}
function drawOverlay(){
  if(gameState!=='ended')return;
  ctx.fillStyle=PAL.overlayBg;ctx.fillRect(0,0,W,H);
  const cx=W/2,cy=H/2,won=endResult==='player',draw=endResult==='draw';
  const txt=won?'YOU WIN':draw?'DRAW':'YOU LOSE';
  const col=won?PAL.winText:draw?PAL.drawText:PAL.loseText;
  ctx.save();ctx.shadowColor=col;ctx.shadowBlur=28;
  ctx.font='bold '+Math.round(W*.10)+'px Courier New,monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=col;ctx.fillText(txt,cx,cy-58);
  ctx.restore();
  let pN=0,aN=0;nodes.forEach(n=>{if(n.owner===OWNER.PLAYER)pN++;if(n.owner===OWNER.AI)aN++;});
  ctx.font='13px Courier New,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(200,200,220,.78)';ctx.fillText('nodes  YOU '+pN+'  ·  AI '+aN,cx,cy-12);
  ctx.font='10px Courier New,monospace';ctx.fillStyle='rgba(130,130,170,.55)';
  ctx.fillText('map: '+MAPS[currentMap].name,cx,cy+8);
  overlayBtns=[];
  const BW=Math.min(158,W*.36),BH=48,gap=16,totalW=BW*2+gap,bx=cx-totalW/2,by=cy+32;
  pillBtn(bx,by,BW,BH,'RETRY',PAL.player,1.0);
  overlayBtns.push({x:bx,y:by,w:BW,h:BH,action:()=>startGame(false)});
  const nmCol=won?PAL.winText:PAL.neutral,nmAlpha=won?1.0:.38;
  pillBtn(bx+BW+gap,by,BW,BH,'NEXT MAP',nmCol,nmAlpha);
  overlayBtns.push({x:bx+BW+gap,y:by,w:BW,h:BH,action:()=>startGame(true)});
  if(won){
    ctx.font='9px Courier New,monospace';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillStyle='rgba(68,255,170,.50)';
    ctx.fillText(MAPS[(currentMap+1)%MAPS.length].name.toUpperCase(),bx+BW+gap+BW/2,by+BH+6);
  }
}
const hudP=document.getElementById('hud-player'),hudT=document.getElementById('hud-timer'),hudA=document.getElementById('hud-ai');
const barP=document.getElementById('bar-player'),barA=document.getElementById('bar-ai'),barN=document.getElementById('bar-neutral');
function updateHUD(){
  let pt=0,at=0,pn=0,an=0,nn=0;
  nodes.forEach(n=>{if(n.owner===OWNER.PLAYER){pt+=Math.floor(n.troops);pn++;}else if(n.owner===OWNER.AI){at+=Math.floor(n.troops);an++;}else nn++;});
  hudP.textContent='YOU ▸ '+pt;hudA.textContent='AI ◂ '+at;
  const s=Math.ceil(gameTime);hudT.textContent=s;hudT.style.color=s<=10?PAL.timerWarn:'#eee';
  const tot=nodes.length;
  barP.style.width=(pn/tot*100).toFixed(1)+'%';
  barA.style.width=(an/tot*100).toFixed(1)+'%';
  barN.style.width=(nn/tot*100).toFixed(1)+'%';
}
const fpsEl=document.getElementById('fps-counter');let fpsLast=0,fpsCount=0;
function trackFPS(now){fpsCount++;if(now-fpsLast>=1000){fpsEl.textContent=fpsCount+' fps';fpsCount=0;fpsLast=now;}}
let lastTime=0;
function loop(now){
  const dt=Math.min((now-lastTime)/1000,.1);lastTime=now;
  if(gameState==='playing'){tickTimer(dt);tickProd(dt);updateWaves(dt);updateImpacts(dt);tickAI(dt);}
  updateNodeAnims(dt);
  ctx.clearRect(0,0,W,H);
  drawEdges();drawImpacts();drawWaves();nodes.forEach(drawNode);drawDragLine();drawOverlay();drawCredBtn();if(showCredits)drawCreditsScreen();
  updateHUD();trackFPS(now);
  requestAnimationFrame(loop);
}
initNodes(currentMap);resize();
requestAnimationFrame(ts=>{lastTime=ts;fpsLast=ts;loop(ts);});
</script>
